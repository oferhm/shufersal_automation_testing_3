[pytest]
# ──────────────────────────────────────────────────────────────────────────────
# pytest.ini — Central Pytest Configuration
# ──────────────────────────────────────────────────────────────────────────────

testpaths = tests

# -v        → verbose: shows each test name + PASS/FAIL
# --tb=short → compact tracebacks on failure
addopts = -v --tb=short

markers =
    smoke:      fast, critical tests — run on every commit
    regression: full regression suite
